apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: build-classname1-base
spec:
  params:
  steps:
    - name: build
      image: icr.io/continuous-delivery/base-images/base:v1.6.0
      script: |
        #!/bin/bash
        echo "Build classname1!"
        head /proc/cpuinfo
        head /proc/meminfo
        lsblk
        df -h .
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: pipeline-classname1
spec:
  params:
  tasks:
    - name: build-classname1
      taskRef:
        name: build-classname1-base
      podTemplate:
        runtimeClassName: x86-large
---
apiVersion: tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: listener-classname1
spec:
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        name: run
      spec:
        securityContext:
          privileged: true
        pipelineRef:
            name: pipeline-classname1
---
apiVersion: tekton.dev/v1
kind: TriggerBinding
metadata:
  name: listener-classname1
spec:
  params:
---
apiVersion: tekton.dev/v1
kind: EventListener
metadata:
  name: listener-classname1
spec:
  triggers:
    - binding:
        name: listener-classname1
      template:
        name: listener-classname1
