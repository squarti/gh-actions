apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: build-classname-base
  #### works
  labels:
    runtimeClassName: x86-large
  ####
spec:
  params:
  steps:
    - name: build
      image: icr.io/continuous-delivery/base-images/base:v1.6.0
      script: |
        #!/bin/bash
        echo "Build classname!"
        head /proc/cpuinfo
        head /proc/meminfo
        lsblk
        df -h .
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: pipeline-classname
spec:
  params:
  tasks:
    - name: build-classname
      taskRef:
        name: build-classname-base
---
apiVersion: tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: listener-classname
spec:
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        name: run
      spec:
        securityContext:
          privileged: true
        pipelineRef:
            name: pipeline-classname

        ###### works
